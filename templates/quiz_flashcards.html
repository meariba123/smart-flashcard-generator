<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quiz Mode - {{ flashcard_set.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/quiz.css') }}">
</head>
<body class="gradient-bg">
    
    <div class="quiz-container">
        <div id="milestoneAnchor" class="milestone-popup"></div>

        <header id="quizHeader" class="quiz-top-nav">
            <div class="stats-row">
                <div id="xpPill" class="stat-pill">✨ XP: <span id="xp">0</span></div>
                <div id="streakPill" class="stat-pill">🔥 <span id="streak">0</span></div>
            </div>
            
            <a href="{{ url_for('dashboard') }}" class="btn-exit-quiz">Exit Quiz</a>
        </header>

        <div id="quizInterface" class="quiz-card main-card-animate">
            <div class="progress-mini">Question <span id="currentNum">1</span> of {{ flashcards|length }}</div>
            
            <div class="question-area">
                <h3 id="question">Loading question...</h3>
            </div>

            <div class="input-area">
                <textarea id="userAnswer" placeholder="Type your answer here..." spellcheck="false"></textarea>
                <button class="btn-submit" onclick="submitAnswer()">Submit Answer</button>
            </div>

            <div id="feedback" class="feedback-toast" style="display:none;"></div>
        </div>

        <div id="resultScreen" class="result-card" style="display:none;">
            <div class="confetti-icon">🏆</div>
            <h2>Session Complete!</h2>
            <p>Here is your mastery breakdown</p>
            
            <div class="result-stats-container">
                <div class="donut-wrapper">
                    <svg viewBox="0 0 36 36" class="circular-chart purple">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        <path id="donut-segment" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        <text x="18" y="21" class="percentage" id="donut-text">0%</text>
                    </svg>
                </div>

                <div class="result-details">
                    <div id="masteryBadge" class="rank-badge">RANK: NOVICE</div>
                    <p>✅ <strong id="res-mastered">0</strong> Mastered</p>
                    <p>⏳ <strong id="res-remaining">0</strong> To Go</p>
                    <p>🔥 Session XP: <strong id="res-xp">0</strong></p>
                </div>
            </div>

            <div class="remark-box">
                <p id="dissertation-remark"></p>
            </div>

            <div class="action-buttons">
                <a href="{{ url_for('mastery_mode', set_id=set_id) }}" class="btn-primary">Continue to Mastery Mode</a>
                <a href="{{ url_for('dashboard') }}" class="btn-secondary">Return to Dashboard</a>
            </div>
        </div>
    </div>

    <script>
        let cards = {{ flashcards|tojson }};
        let currentIndex = 0;

        function renderCard() {
            if (currentIndex >= cards.length) {
                showResults();
                return;
            }
            document.getElementById("currentNum").innerText = currentIndex + 1;
            document.getElementById("question").innerText = cards[currentIndex].question;
            document.getElementById("userAnswer").value = "";
            document.getElementById("feedback").style.display = "none";
            document.getElementById("userAnswer").focus();
            
            const btn = document.querySelector('.btn-submit');
            btn.disabled = false;
            btn.innerText = "Submit Answer";
        }

        function submitAnswer() {
            const btn = document.querySelector('.btn-submit');
            const answer = document.getElementById("userAnswer").value;
            
            if (!answer.trim()) return;

            btn.disabled = true;
            btn.innerText = "Analysing...";

            fetch("/check_mastery_answer", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({
                    card_id: cards[currentIndex]._id,
                    user_answer: answer
                })
            })
            .then(res => res.json())
            .then(data => {
                cards[currentIndex].status = data.status;
                
                const streakPill = document.getElementById("streakPill");
                const xpPill = document.getElementById("xpPill");
                const milestone = document.getElementById("milestoneAnchor");

                document.getElementById("streak").innerText = data.streak;
                document.getElementById("xp").innerText = data.xp;

                if (data.correct) {
                    streakPill.classList.add("streak-animate");
                    xpPill.classList.add("xp-animate");
                    setTimeout(() => {
                        streakPill.classList.remove("streak-animate");
                        xpPill.classList.remove("xp-animate");
                    }, 600);

                    if (data.streak > 0 && data.streak % 3 === 0) {
                        milestone.innerText = data.streak >= 9 ? "🔥 UNSTOPPABLE!" : "✨ EXCELLENT!";
                        milestone.classList.add("animate-float");
                        setTimeout(() => milestone.classList.remove("animate-float"), 1200);
                    }
                }

                let feedback = document.getElementById("feedback");
                feedback.className = data.correct ? "feedback-toast correct" : "feedback-toast incorrect";
                feedback.innerText = data.correct ? "✅ Spot on!" : "❌ Not quite right";
                feedback.style.display = "block";

                setTimeout(() => {
                    currentIndex++;
                    renderCard();
                }, 1200);
            });
        }

        function showResults() {
            document.getElementById("quizInterface").style.display = "none";
            document.getElementById("quizHeader").style.display = "none";
            document.getElementById("resultScreen").style.display = "block";

            let masteredCount = cards.filter(c => c.status === "green").length;
            let total = cards.length;
            let masteredPercent = Math.round((masteredCount / total) * 100);

            setTimeout(() => {
                document.getElementById("donut-segment").setAttribute("stroke-dasharray", `${masteredPercent}, 100`);
                document.getElementById("donut-text").textContent = masteredPercent + "%";
            }, 300);

            document.getElementById("res-mastered").innerText = masteredCount;
            document.getElementById("res-remaining").innerText = total - masteredCount;
            document.getElementById("res-xp").innerText = document.getElementById("xp").innerText;

            let remark = masteredPercent === 100 ? "Perfect score! Mastery achieved." : 
                         masteredPercent > 60 ? "Great job! Almost there." : "Keep practicing to improve.";
            document.getElementById("dissertation-remark").innerText = remark;
        }

        renderCard();
    </script>
</body>
</html>
